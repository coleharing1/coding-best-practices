name: schema-parity

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "supabase/**"
      - "prisma/**"
      - "migrations/**"

jobs:
  schema-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run schema:parity -- --envs dev,prod --strict
